<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text: #f8f4ec;
      --muted: #b8c2cc;
      --accent: #7dd3fc;
      --accent-2: #facc15;
      --accent-3: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(125, 211, 252, 0.22), transparent 30%),
        radial-gradient(circle at 82% 28%, rgba(250, 204, 21, 0.16), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(251, 113, 133, 0.2), transparent 34%),
        linear-gradient(135deg, #111318 0%, #20222a 52%, #161923 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .shell {
      width: min(92vw, 780px);
      padding: 2px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      animation: float 6s ease-in-out infinite;
    }

    .card {
      min-height: 420px;
      padding: clamp(32px, 7vw, 72px);
      display: grid;
      align-content: center;
      gap: 28px;
      border-radius: 26px;
      border: 1px solid var(--panel-border);
      background:
        linear-gradient(145deg, rgba(17, 19, 24, 0.86), rgba(17, 19, 24, 0.62)),
        var(--panel);
      backdrop-filter: blur(22px);
    }

    .eyebrow {
      width: max-content;
      margin: 0;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.6rem, 12vw, 8.5rem);
      line-height: 0.88;
      letter-spacing: 0;
    }

    .gradient-text {
      display: block;
      color: transparent;
      background: linear-gradient(92deg, #f8f4ec, var(--accent), var(--accent-2), var(--accent-3));
      background-size: 260% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      animation: shine 7s ease-in-out infinite;
    }

    .copy {
      max-width: 56ch;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.25rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 0;
      background: #f8f4ec;
      color: #111318;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(248, 244, 236, 0.18);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(248, 244, 236, 0.24);
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .spark {
      color: var(--accent-2);
    }

    @keyframes shine {
      0%, 100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
        padding: 20px;
      }

      .card {
        min-height: 520px;
      }

      .eyebrow {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Hello world welcome card">
    <section class="card">
      <p class="eyebrow">First page, big entrance</p>
      <h1>
        Hello
        <span class="gradient-text">World.</span>
      </h1>
      <p class="copy">
        A tiny HTML file with a little polish: glassy depth, animated color, crisp typography,
        and enough sparkle to make the classic greeting feel awake.
      </p>
      <div class="actions">
        <a class="button" href="#" aria-label="Celebrate this hello world page">Celebrate <span class="spark">&nbsp;*</span></a>
        <span class="status">Ready to open in any browser.</span>
      </div>
    </section>
  </main>
</body>
</html>
