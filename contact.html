<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World | Contact</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text: #f8f4ec;
      --muted: #b8c2cc;
      --accent: #7dd3fc;
      --accent-2: #facc15;
      --accent-3: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(125, 211, 252, 0.22), transparent 30%),
        radial-gradient(circle at 82% 28%, rgba(250, 204, 21, 0.16), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(251, 113, 133, 0.2), transparent 34%),
        linear-gradient(135deg, #111318 0%, #20222a 52%, #161923 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .shell {
      width: min(92vw, 780px);
      padding: 2px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      animation: float 6s ease-in-out infinite;
    }

    .card {
      min-height: 420px;
      padding: clamp(32px, 7vw, 72px);
      display: grid;
      align-content: center;
      gap: 24px;
      border-radius: 26px;
      border: 1px solid var(--panel-border);
      background:
        linear-gradient(145deg, rgba(17, 19, 24, 0.86), rgba(17, 19, 24, 0.62)),
        var(--panel);
      backdrop-filter: blur(22px);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      transition: color 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .nav a:hover,
    .nav a[aria-current="page"] {
      border-color: rgba(248, 244, 236, 0.5);
      background: rgba(248, 244, 236, 0.12);
      color: var(--text);
    }

    .eyebrow {
      width: max-content;
      margin: 0;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 10vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .gradient-text {
      display: block;
      color: transparent;
      background: linear-gradient(92deg, #f8f4ec, var(--accent), var(--accent-2), var(--accent-3));
      background-size: 260% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      animation: shine 7s ease-in-out infinite;
    }

    .copy {
      max-width: 58ch;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.3vw, 1.18rem);
      line-height: 1.7;
    }

    .contact-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .contact-list a {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      min-height: 54px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .contact-list a:hover {
      transform: translateY(-2px);
      border-color: rgba(248, 244, 236, 0.46);
      background: rgba(255, 255, 255, 0.11);
    }

    .contact-list span {
      color: var(--muted);
      font-weight: 700;
    }

    @keyframes shine {
      0%, 100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @media (max-width: 620px) {
      body {
        overflow: auto;
        padding: 20px;
      }

      .card {
        min-height: 560px;
      }

      .eyebrow {
        width: auto;
      }

      .contact-list a {
        display: grid;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Contact page">
    <section class="card">
      <nav class="nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
      <p class="eyebrow">Say hello</p>
      <h1>
        Let's
        <span class="gradient-text">connect.</span>
      </h1>
      <p class="copy">
        This contact page is ready for real details when you want them. For now, it keeps
        the site polished and gives visitors a clear next step.
      </p>
      <ul class="contact-list" aria-label="Contact methods">
        <li>
          <a href="mailto:hello@example.com">Email <span>hello@example.com</span></a>
        </li>
        <li>
          <a href="tel:+10000000000">Phone <span>+1 000 000 0000</span></a>
        </li>
        <li>
          <a href="index.html">Back home <span>Return to the start</span></a>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
